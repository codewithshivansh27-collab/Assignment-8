<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>News Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>📰 News Hub</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search news topic...">
            <button onclick="searchNews()">Search</button>
        </div>

        <div class="topics">
            <button onclick="fetchNews('technology')">Technology</button>
            <button onclick="fetchNews('sports')">Sports</button>
            <button onclick="fetchNews('india')">India</button>
            <button onclick="fetchNews('science')">Science</button>
            <button onclick="fetchNews('business')">Business</button>
        </div>

    </header>

    <div id="newsContainer" class="news-container"></div>

    <script src="script.js"></script>

</body>

</html>
